<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Poppins", Arial, sans-serif;
      background-color: #0d0d0d;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      width: 100%;
      background-color: #111;
      padding: 15px 0;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 2px solid #333;
    }
    main {
      flex: 1;
      width: 90%;
      max-width: 800px;
      text-align: center;
      padding: 30px 0;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 40px;
    }
    a.button {
      display: inline-block;
      padding: 12px 25px;
      background-color: #2a82ff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }
    a.button:hover {
      background-color: #1a5dcc;
    }
    footer {
      padding: 15px 0;
      text-align: center;
      font-size: 14px;
      color: #888;
      border-top: 1px solid #333;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>My Website</header>
  <main>
    <h1>Welcome to My Website!</h1>
    <p>This is my personal site — I post projects, games, and experiments here.</p>
    <a class="button" href="game.html">Play My Game</a>
  </main>
  <footer>© 2025 My Website — All Rights Reserved</footer>
</body>
</html>
